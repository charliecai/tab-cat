      runtime: {
        id: 'tab-out-spec',
        sendMessage: async () => ({}),

      tabs: {
        query: async () => [],
        create: async () => ({}),
        update: async () => ({}),
        remove: async () => ({}),

        getCurrent: async () => ({ id: 1 }),
      },
      storage: {
        local: {
          get: async () => ({}),
          set: async () => ({}),
        },
      },
    };
  </script>
